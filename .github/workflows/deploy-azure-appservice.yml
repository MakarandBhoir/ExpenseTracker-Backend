name: Deploy Expense Tracker Backend to Azure App Service

on:
    push:
        branches:
            - main
    workflow_dispatch:

permissions:
    contents: read

env:
    JAVA_VERSION: "21"
    APP_NAME: baendend-expensetracker

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Check out repository
              uses: actions/checkout@v4

            - name: Set up Java
              uses: actions/setup-java@v4
              with:
                  distribution: microsoft
                  java-version: ${{ env.JAVA_VERSION }}
                  cache: maven

            - name: Build application
              run: mvn -B clean package

            - name: Prepare deployable JAR
              shell: bash
              run: |
                  JAR_FILE=$(find target -maxdepth 1 -type f -name "*.jar" ! -name "*.jar.original" | head -n 1)
                  if [ -z "$JAR_FILE" ]; then
                    echo "No deployable JAR found in target/."
                    exit 1
                  fi
                  cp "$JAR_FILE" app.jar

            - name: Upload deployment artifact
              uses: actions/upload-artifact@v4
              with:
                  name: app-service-package
                  path: app.jar

    deploy:
        runs-on: ubuntu-latest
        needs: build
        # environment:
        #     name: production

        steps:
            - name: Download deployment artifact
              uses: actions/download-artifact@v4
              with:
                  name: app-service-package

            - name: Deploy to Azure App Service
              uses: azure/webapps-deploy@v3
              with:
                  app-name: ${{ env.APP_NAME }}
                  publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
                  package: app.jar
